# Tokenizer training + morphological evaluation sweep.
#
# Trains five tokenizers (bpe, wordpiece, unigram, morphbpe, morphpiece) at
# each vocab size and evaluates them with six metrics. Consumed by both
# scripts/tokenizers/train.py and scripts/tokenizers/analyze.py.
#
# Secrets / machine-specific overrides (e.g. mlflow.tracking_uri) belong in a
# gitignored sibling tokenizers.local.yaml, which is deep-merged over this file.

# --- Training corpus -------------------------------------------------------
corpus:
  root: /vault/data/SLM4IE/pretrain/05_2_dedup   # final deduplicated corpus
  datasets: []                                   # [] = all dataset subdirs
  budget:
    max_bytes: 2_000_000_000                     # ~2 GB sampled training text
    max_docs: null
    seed: 13
    weight_key: dataset                          # source = dataset subdir name
    source_weights: {}                           # per-source weights; default 1.0

# --- Sweep -----------------------------------------------------------------
# bpe = byte-level (canonical); charbpe = char-level (clean MorphBPE ablation).
tokenizers: [bpe, charbpe, wordpiece, unigram, morphbpe, morphpiece]
vocab_sizes: [16000, 32000, 64000]
special_tokens: ["<pad>", "<unk>", "<s>", "</s>", "<mask>"]

# --- Morphology (Sloleks-derived silver gold) ------------------------------
# sloleks_path        inflectional gold (form -> stem+suffix), heuristic.
# sloleks_relations_path  derivational gold (lemma -> morphemes), from the
#                     Sloleks 2.0 word relations (CLARIN 11356/1986). When set,
#                     its morphemes also enrich the morphological backends'
#                     table and the report gains derivational *_deriv columns.
morphology:
  sloleks_path: /vault/data/SLM4IE/tokenization/sloleks.jsonl.gz
  sloleks_relations_path: /vault/data/SLM4IE/tokenization/sloleks_relations.jsonl.gz
  min_stem_len: 2

# --- Output ----------------------------------------------------------------
output:
  root: /vault/data/SLM4IE/tokenizers            # per-run artifact subdirs
  report_dir: /vault/data/SLM4IE/tokenizers/_reports

# --- Evaluation ------------------------------------------------------------
eval:
  corpus_budget:
    max_bytes: 200_000_000                       # held-out sample (different seed)
    seed: 99
  renyi_alpha: 2.5

# --- Statistics ------------------------------------------------------------
# Bootstrap CIs + paired significance for the decomposable metrics. Corpus
# metrics resample documents (block bootstrap over the held-out eval docs);
# morph metrics resample forms from a deterministic shared sample so forms align
# by index for the paired tests. renyi_efficiency and morph_consistency are
# global functionals that do not decompose and stay point estimates (no CI).
stats:
  n_resamples: 2000                              # bootstrap resamples (B)
  ci_level: 0.95                                 # confidence level
  seed: 12345                                    # shared-resample seed
  morph_form_sample: 200000                      # forms for morph CIs/tests

# --- MLflow ----------------------------------------------------------------
# Experiment follows the slm4ie/<task>/<dataset> convention. tracking_uri null
# falls back to $MLFLOW_TRACKING_URI (the localhost:5555 service in this setup),
# then to a local SQLite store if neither is set.
mlflow:
  experiment: slm4ie/tokenization/slovenian
  enabled: true                                  # train + analyze both log to MLflow
  tracking_uri: null                             # null -> $MLFLOW_TRACKING_URI -> sqlite fallback
