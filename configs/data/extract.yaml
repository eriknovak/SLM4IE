# extract.yaml — Sources to normalize into the canonical `extracted/` tier.
#
# Consumed by: scripts/data/extract.py. The dataset key list here is also
#   the key list to_pretrain.py iterates when building the pretrain corpus.
# Reads:  <input_dir>/<key>/ — raw downloads from download.py.
# Writes: <output_dir>/<key>.jsonl (+ <key>.annotations.jsonl.gz when the
#   extractor emits annotations).
#
# Top-level keys:
#   input_dir    Root of raw downloads (download.py's output_dir).
#   output_dir   Root for the extracted/ tier.
#   datasets     Map of <dataset key> -> extraction spec.
#
# Extraction spec fields:
#   extractor    Registered reader to use. One of:
#                  jsonl       — line-delimited JSON
#                  json        — single JSON document/array
#                  text        — plain text
#                  conllu      — CoNLL-U annotated columns
#                  tei         — TEI XML (parliamentary/academic corpora)
#                  macocu      — MaCoCu monolingual XML
#                  coleslaw    — COLESLAW legal-text format
#                  huggingface — a locally cached HuggingFace dataset
#                The registry lives in slm4ie/data/extractors/.
#   domain       Free-text provenance tag (web, wiki, parliamentary,
#                academic, legal, medical, scientific, forum, blog, news,
#                student, mixed). Flows into Document.metadata and drives
#                source-weighted sampling downstream.
#   metadata     Optional. Two unrelated uses share this block:
#                (a) For the conllu/tei extractors: per-document metadata
#                    loaded from an external TSV (keys below).
#                (b) For the jsonl extractor: field-mapping knobs for
#                    feeds that don't use the default field names —
#                      text_field       Record field copied into `text`
#                                        (default "text").
#                      id_field         Record field kept as `doc_id`
#                                        (default "doc_id").
#                      metadata_fields  Whitelist of record fields kept
#                                        as metadata (default: every
#                                        non-structural field).
#                TSV keys, joined per source file
#                (kas/kzb: filename stem; oss: numeric ID extracted via
#                key_pattern). Recognized keys:
#                  path         TSV path relative to input_dir/<key>/.
#                  key_column   Column in the TSV used for lookups.
#                  key_from     Strategy for deriving the lookup key
#                               from a source file. "filename_stem" only.
#                  key_pattern  Optional regex; group 1 becomes the key.
#                  fields       {tsv_column: metadata_field} renames.
#                  splits       Optional {tsv_column: separator} to turn
#                               list-typed columns (e.g. pipe-separated
#                               keywords) into JSON arrays.
#                Currently honored by the conllu and tei extractors.
#
# Selection: pass dataset keys positionally, or --all for every entry.
#   --force re-extracts existing outputs; --max-workers sets parallelism.

input_dir: /vault/data/SLM4IE/raw
output_dir: /vault/data/SLM4IE/extracted

# MLflow tracking for extraction builds. When enabled, a single run per build
# is upserted to `experiment` (keyed by a content digest of the extracted
# tree): per-source row counts + empty-text rates as metrics, a per-source
# quality profile as the `profile.json` artifact, and the extracted tree as a
# `produced` dataset input. Disabled by default; toggle with --mlflow /
# --no-mlflow. tracking_uri null -> $MLFLOW_TRACKING_URI -> sqlite fallback.
mlflow:
  enabled: false
  experiment: slm4ie/data/extract
  tracking_uri: null

datasets:
  classla_web_sl:
    extractor: jsonl
    domain: web

  classlawiki_sl:
    extractor: conllu
    domain: wiki

  macocu_sl:
    extractor: macocu
    domain: web

  parlamint_si:
    extractor: tei
    domain: parliamentary

  kas:
    extractor: tei
    domain: academic
    metadata:
      path: kas-meta.tsv
      key_column: id              # values like "kas-10000" match the TEI filename stem
      key_from: filename_stem
      fields:
        cerif: cerif
        cerif_conf: cerif_conf
        udc: udc
        udc_desc: udc_desc
        type: doctype
        publisher_abbr: faculty
        keywords: keywords
      splits:
        keywords: "|"

  coleslaw:
    extractor: coleslaw
    domain: legal

  povejmo_vemo_med:
    extractor: json
    domain: medical

  oss:
    extractor: conllu
    domain: scientific
    metadata:
      path: OSS.CoNLL-U/OSS-metadata.tsv
      key_column: id
      key_from: filename_stem
      key_pattern: '^oss-(\d+)$'  # filenames like oss-10000.conllu
      fields:
        cerif: cerif
        udc: udc
        udc_desc: udc_desc
        type: doctype
        publisher_abbr: faculty
        keywords: keywords
      splits:
        cerif: "|"
        keywords: "|"
        udc_desc: "|"

  siparl:
    extractor: tei
    domain: parliamentary

  janes_forum:
    extractor: tei
    domain: forum

  janes_blog:
    extractor: tei
    domain: blog

  janes_news:
    extractor: tei
    domain: news

  kzb:
    extractor: conllu
    domain: scientific
    metadata:
      path: KZB.conll/KZB.tsv
      key_column: ID
      key_from: filename_stem
      fields:
        Fields: field
        Type: doctype
        Keywords: keywords
        Publisher: publisher
      splits:
        Fields: ","
        Keywords: ","

  solar:
    extractor: conllu
    domain: student

  finepdf:
    extractor: huggingface
    domain: web

  fineweb2:
    extractor: huggingface
    domain: web

  culturax:
    extractor: huggingface
    domain: web

  legal_mc4:
    extractor: jsonl
    domain: legal

  slovenian_news:
    # Living corpus of Slovenian news articles, refreshed weekly as new
    # <YYYY-MM-DD>_<YYYY-MM-DD>.jsonl windows land under the raw dir.
    # Records carry text in `body` and id in `uri`. Re-run
    # extraction with --force to pick up newly added weekly files.
    extractor: jsonl
    domain: news
    metadata:
      text_field: body
      id_field: uri
      metadata_fields: [url, title, dateTime, source]

  c4:
    extractor: huggingface
    domain: web

  hplt:
    extractor: huggingface
    domain: web

  cc100:
    extractor: text
    domain: web

  gigafida:
    extractor: tei
    domain: mixed

  suk:
    extractor: conllu
    domain: mixed

  ssj500k:
    extractor: conllu
    domain: mixed
