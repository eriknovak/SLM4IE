# pretrain.yaml — Eight-stage pretraining-corpus build (datatrove-backed).
#
# Consumed by: scripts/data/to_pretrain.py. The dataset key list comes
#   from configs/data/extract.yaml.
# Reads:  <input_dir>/<key>.jsonl — the extracted/ tier.
# Writes: <output_dir>/00_convert/ … 06_statistics/ — one subtree per stage.
#
# Top-level keys:
#   input_dir    Root of the extracted/ tier.
#   output_dir   Root of the pretrain-owned stage tree.
#   stopwords    Language code (e.g. `sl`) selecting the bundled
#                stopword list at slm4ie/data/stopwords/<code>.txt;
#                used by the `quality` and `stats` stages. Omit the
#                key to disable stopwords; an unknown code is an error.
#   <stage>      One section per stage (convert, language, spam, quality,
#                repetition, exact_dedup, sentence_dedup, stats); each is
#                documented inline below and is the exclusive input to
#                that stage's sentinel hash.
#
# Behavior: each stage writes a durable artifact + a `.complete` sentinel;
#   on rerun a stage is skipped when its config-slice hash is unchanged.
#   Editing one section cascade-invalidates that stage and every
#   downstream stage. Pass dataset keys positionally, or --all.

input_dir: /vault/data/SLM4IE/extracted
output_dir: /vault/data/SLM4IE/pretrain

# Language code selecting the bundled stopword list at
# slm4ie/data/stopwords/<code>.txt. Used by both the quality stage
# (Gopher's min_stop_words) and the stats stage (word/n-gram/keyword
# filtering). Omit to disable; unknown code raises at startup.
stopwords: sl

# 00_convert — Stage 0: lift extracted <key>.jsonl into datatrove
#   `Document`-shaped shards (text / id / metadata).
#   Consumed by: slm4ie/data/curate/convert.py
#   Reads:  <input_dir>/<key>.jsonl (+ optional .annotations.jsonl.gz)
#   Writes: <output_dir>/00_convert/<key>/*.jsonl.gz
#   Keys:
#     text_field           Source-record field copied into `text`.
#     id_field             Source-record field kept verbatim as the
#                          document id; always kept even if absent from
#                          metadata_fields.
#     metadata_fields      Source fields kept verbatim under
#                          Document.metadata. The extraction `source`
#                          field is auto-renamed to `dataset` (downstream
#                          writers route by `${dataset}`); never list it.
#     include_annotations  Join the .annotations sidecar as a nested
#                          `annotations` field. Off by default —
#                          annotations desync once a later stage rewrites
#                          the text.
#     max_shard_bytes      Compressed-byte ceiling per output shard.
convert:
  text_field: text
  id_field: doc_id
  metadata_fields: [domain, doc_id]
  include_annotations: false
  max_shard_bytes: 200000000 # ~200 MB compressed per shard

# 01_language — Stage 1: lingua-py language detection.
#   Consumed by: slm4ie/data/curate/language.py (LinguaLanguageFilter),
#                wired by pipeline.build_language_executors.
#   Reads:  <output_dir>/00_convert/   Writes: <output_dir>/01_language/
#   Keys:
#     targets                     ISO 639-1 codes treated as in-language.
#     candidates                  ISO 639-1 candidate set lingua chooses
#                                 among — every European language lingua
#                                 supports (36 living European languages
#                                 plus Turkish), so `sl` is disambiguated
#                                 against its real neighbours rather than
#                                 the full 75-language model. Order is
#                                 irrelevant; targets are appended if
#                                 missing.
#     minimum_relative_distance   Required confidence gap before lingua
#                                 commits to a label. 0.0 disables.
#     mode                        `filter` drops out-of-target docs;
#                                 `tag` keeps every doc and only writes
#                                 metadata.language.
#     low_accuracy                Use lingua's lighter trigram-only model.
#     max_chars                   Truncate doc text to this many chars
#                                 before detection. null disables.
language:
  targets: [sl]
  candidates:
    [
      be,
      bg,
      bs,
      ca,
      cs,
      cy,
      da,
      de,
      el,
      en,
      es,
      et,
      eu,
      fi,
      fr,
      ga,
      hr,
      hu,
      is,
      it,
      lt,
      lv,
      mk,
      nb,
      nl,
      nn,
      pl,
      pt,
      ro,
      ru,
      sk,
      sl,
      sq,
      sr,
      sv,
      tr,
      uk,
    ]
  minimum_relative_distance: 0.1
  mode: filter
  low_accuracy: true
  max_chars: 2048

# 02_spam — Stage 2: adult / SEO-spam removal.
#   Drops docs flagged by any of three language-aware signals: a curated
#   per-language lexicon of unambiguous adult and SEO/scam terms, a
#   language-agnostic URL/domain blocklist matched against metadata.url,
#   and an optional pluggable model scorer. High precision by design — the
#   lexicon excludes ambiguous common words and relies on the URL
#   blocklist plus the hit thresholds for borderline cases.
#   Consumed by: slm4ie/data/curate/spam.py (SpamFilter), wired by
#                pipeline.build_spam_executors. Lexicons + domain list live
#                under slm4ie/data/spam/ and are folded into this stage's
#                sentinel hash, so editing a list re-runs the stage.
#   Reads:  <output_dir>/01_language/  Writes: <output_dir>/02_spam/
#   Keys:
#     languages         Language codes whose curated lists (adult.txt +
#                       spam.txt under slm4ie/data/spam/<code>/) load
#                       eagerly. An unknown code raises at startup.
#     use_ldnoobw       Auto-load an LDNOOBW adult list for a document's
#                       language when no curated list is shipped for it.
#     url_blocklist     Enable the URL/domain blocklist signal.
#     min_adult_hits    Drop a doc once its adult-term occurrences reach
#                       this count.
#     min_spam_hits     Drop a doc once its SEO/scam-term occurrences
#                       reach this count.
#     keep_fraction     Fraction of flagged docs to retain anyway (seeded
#                       sampling); retained docs get metadata.spam_reason.
#     default_language  Language assumed for docs without metadata.language.
#     model             Optional classifier spec; null = lexicon + URL only
#                       (a non-null value requires a resolver to be wired).
#     model_threshold   Score at/above which the model flags a document.
spam:
  languages: [sl, en]
  use_ldnoobw: true
  url_blocklist: true
  min_adult_hits: 2
  min_spam_hits: 2
  keep_fraction: 0.0
  default_language: sl
  model: null
  model_threshold: 0.5

# 03_quality — Stage 3: Gopher WITHIN-DOCUMENT quality heuristics.
#   Drops docs on their own text alone; never compares across docs.
#   Consumed by: datatrove GopherQualityFilter, wired by
#                pipeline.build_quality_executors (QualityConfig). Also
#                reads the shared `stopwords` configuration above.
#   Reads:  <output_dir>/02_spam/  Writes: <output_dir>/03_quality/
#   Keys:
#     min_doc_words               Drop docs shorter than this.
#     max_doc_words               Drop docs longer than this.
#     min_avg_word_length         Drop docs below this mean word length.
#     max_avg_word_length         Drop docs above this mean word length.
#     max_symbol_word_ratio       Max fraction of word-like tokens that
#                                 are pure symbols.
#     max_bullet_lines_ratio      Max fraction of lines starting with a
#                                 bullet glyph.
#     max_ellipsis_lines_ratio    Max fraction of lines ending in an
#                                 ellipsis.
#     max_non_alpha_words_ratio   MINIMUM fraction of words that must
#                                 contain an alphabetic character
#                                 (datatrove keeps the legacy name).
#     min_stop_words              Minimum stopword tokens a doc must
#                                 contain (uses the `stopwords` list
#                                 selected above).
quality:
  min_doc_words: 20
  max_doc_words: 1000000
  min_avg_word_length: 2
  max_avg_word_length: 12
  max_symbol_word_ratio: 0.1
  max_bullet_lines_ratio: 0.9
  max_ellipsis_lines_ratio: 0.3
  max_non_alpha_words_ratio: 0.8
  min_stop_words: 2

# 04_repetition — Stage 4: Gopher WITHIN-DOCUMENT repetition heuristics.
#   Drops docs whose own text repeats too much internally (duplicate
#   paragraphs/lines, top-n-gram saturation, dup-n-gram fractions).
#   Consumed by: datatrove GopherRepetitionFilter, wired by
#                pipeline.build_repetition_executors.
#   Reads:  <output_dir>/03_quality/  Writes: <output_dir>/04_repetition/
#   Keys: none — the empty mapping `{}` keeps datatrove's Gopher-paper
#         defaults. The section must still exist (it drives this stage's
#         sentinel hash slice).
repetition: {}

# 05_1_dedup — Stage 5: whole-document exact dedup ACROSS THE CORPUS.
#   Two docs with byte-identical text collapse to one (runs as a
#   signature -> find -> filter executor chain).
#   Consumed by: slm4ie/data/curate/dedup.py (make_exact_config), wired
#                by pipeline.build_exact_dedup_executors.
#   Reads:  <output_dir>/04_repetition/  Writes: <output_dir>/05_1_dedup/
#   Keys:
#     precision             Hash width in bits (32 | 64). 64 is the
#                           collision-safe default up to ~10B docs; 32
#                           only for very small corpora.
#     hash_fc               Hash function (xxhash | sha1). xxhash is
#                           faster; sha1 is strong but unnecessary here.
#     only_dedup_in_index   True dedups only within this run's index
#                           (datatrove default); False extends an
#                           existing dedup index across runs.
exact_dedup:
  precision: 64
  hash_fc: xxhash
  only_dedup_in_index: true

# 05_2_dedup — Stage 6: N-sentence sliding-window dedup ACROSS THE
#   CORPUS. Removes sentence windows that recur across docs, then drops
#   docs whose surviving text falls below the floors. Its output folder
#   is the final pretraining corpus.
#   Consumed by: datatrove SentDedupConfig / SentenceDedup* blocks,
#                wired by pipeline.build_sentence_dedup_executors.
#   Reads:  <output_dir>/05_1_dedup/  Writes: <output_dir>/05_2_dedup/
#   Keys:
#     n_sentences         Sentences per sliding window compared across
#                         docs.
#     min_doc_words       Drop a doc whose surviving text (after
#                         duplicate windows are cut) has fewer words.
#     min_num_sentences   Drop a doc with fewer surviving sentences.
#     split_sentences     Split text into sentences (vs. lines) before
#                         building windows.
sentence_dedup:
  n_sentences: 3
  min_doc_words: 50
  min_num_sentences: 2
  split_sentences: true

# 06_statistics — Stage 7: corpus totals, per-domain / per-dataset
#   distributions, and a global top-K word-frequency table.
#   Map-reduce: each map worker accumulates counters and writes a
#   partial pickle, then a single reduce worker sums partials and
#   emits `aggregate.json` + per-dataset breakdowns. Does not filter
#   — read-only pass.
#   Consumed by: slm4ie/data/curate/stats.py (CorpusStats), wired by
#                pipeline.build_stats_executors. Also reads the shared
#                `stopwords` configuration above.
#   Reads:  <output_dir>/05_2_dedup/
#   Writes: <output_dir>/06_statistics/ (aggregate.json + per_dataset/)
#   Keys:
#     top_k_words   Size of the word-frequency table.
stats:
  top_k_words: 200
