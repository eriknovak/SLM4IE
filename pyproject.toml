[project]
name = "slm4ie"
version = "0.1.0"
description = "Small language models for zero-shot information extraction in Slovenian"
readme = "README.md"
requires-python = ">=3.13"
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "ruff>=0.4.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff]
line-length = 80
target-version = "py313"

[tool.pytest.ini_options]
testpaths = ["tests"]
